<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#0d0d1a"/>
  <title>HuellaViva — Encuentra a tu mejor amigo</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    :root {
      --bg: #0d0d1a; --surface: #16162a; --surface2: #1e1e38;
      --accent: #ff6b35; --accent2: #ffd166; --blue: #4361ee;
      --green: #06d6a0; --red: #ef233c; --text: #f0f0f0;
      --muted: #8888aa; --border: rgba(255,255,255,0.08); --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
    .nav { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; color: var(--accent); }
    .logo span { color: var(--accent2); }
    .nav-badge { background: var(--red); color: #fff; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
    .tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); }
    .tab { flex: 1; padding: 12px 4px; text-align: center; font-size: 11px; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-icon { font-size: 16px; display: block; margin-bottom: 2px; }
    .screen { display: none; padding: 16px; padding-bottom: 80px; }
    .screen.active { display: block; }
    #map { width: 100%; height: 300px; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
    .section-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; margin: 16px 0 10px; }
    .cards { display: flex; flex-direction: column; gap: 10px; }
    .dog-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; display: flex; gap: 12px; cursor: pointer; transition: border-color 0.2s; }
    .dog-card.urgent { border-color: #ef233c44; }
    .dog-avatar { width: 58px; height: 58px; border-radius: 10px; flex-shrink: 0; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 26px; }
    .dog-info { flex: 1; min-width: 0; }
    .dog-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; }
    .dog-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .dog-tags { display: flex; gap: 5px; margin-top: 6px; flex-wrap: wrap; }
    .tag { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
    .tag-lost { background: #ef233c22; color: #ef233c; }
    .tag-found { background: #06d6a022; color: #06d6a0; }
    .tag-reward { background: #ffd16622; color: #ffd166; }
    .tag-urgent { background: #ef233c; color: #fff; }
    .dog-distance { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .wa-btn { display: inline-flex; align-items: center; gap: 6px; background: #25d36622; color: #25d366; border: 1px solid #25d36644; border-radius: 20px; padding: 5px 12px; font-size: 11px; font-weight: 600; cursor: pointer; margin-top: 8px; text-decoration: none; }
    .wa-btn:hover { background: #25d36633; }
    .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
    .form-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 17px; margin-bottom: 4px; }
    .form-sub { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
    .field { margin-bottom: 14px; }
    .field label { font-size: 11px; color: var(--muted); font-weight: 500; display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
    .field input, .field select, .field textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 11px 13px; color: var(--text); font-size: 13px; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.2s; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
    .field textarea { resize: none; height: 80px; }
    .field select option { background: var(--surface2); }
    .row { display: flex; gap: 10px; }
    .row .field { flex: 1; }
    .btn-primary { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 12px; padding: 14px; font-size: 14px; font-weight: 600; font-family: 'Syne', sans-serif; cursor: pointer; margin-top: 4px; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .location-btn { display: flex; align-items: center; gap: 6px; background: var(--blue); color: #fff; border: none; border-radius: 8px; padding: 8px 14px; font-size: 12px; cursor: pointer; margin-top: 6px; }
    .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .loading { text-align: center; padding: 30px; color: var(--muted); font-size: 13px; }
    .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--green); color: #000; padding: 10px 18px; border-radius: 20px; font-size: 13px; font-weight: 600; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
    .toast.show { opacity: 1; }
    .toast.error { background: var(--red); color: #fff; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); display: flex; padding: 8px 0 12px; z-index: 100; }
    .bnav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; padding: 4px; }
    .bnav-icon { font-size: 20px; }
    .bnav-label { font-size: 10px; color: var(--muted); }
    .bnav-item.active .bnav-label { color: var(--accent); }
  </style>
</head>
<body>

<div class="nav">
  <div class="logo">Huella<span>Viva</span></div>
  <div class="nav-badge" id="contador">cargando...</div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('mapa')"><span class="tab-icon">🗺️</span>Mapa</div>
  <div class="tab" onclick="showTab('perdidos')"><span class="tab-icon">🐾</span>Perdidos</div>
  <div class="tab" onclick="showTab('reportar')"><span class="tab-icon">📢</span>Reportar</div>
  <div class="tab" onclick="showTab('encontrados')"><span class="tab-icon">✅</span>Encontrados</div>
</div>

<!-- MAPA -->
<div class="screen active" id="screen-mapa">
  <div id="map"></div>
  <div style="display:flex;gap:12px;margin-top:10px;flex-wrap:wrap;">
    <span style="font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;"><span style="width:10px;height:10px;border-radius:50%;background:#ef233c;display:inline-block"></span>Perdido</span>
    <span style="font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;"><span style="width:10px;height:10px;border-radius:50%;background:#06d6a0;display:inline-block"></span>Encontrado</span>
    <span style="font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;"><span style="width:10px;height:10px;border-radius:50%;background:#4361ee;display:inline-block"></span>Tu ubicación</span>
  </div>
  <div class="section-title">Casos recientes</div>
  <div class="cards" id="cards-mapa"><div class="loading">Cargando reportes...</div></div>
</div>

<!-- PERDIDOS -->
<div class="screen" id="screen-perdidos">
  <div class="section-title">Perros perdidos activos</div>
  <div class="cards" id="cards-perdidos"><div class="loading">Cargando...</div></div>
</div>

<!-- REPORTAR -->
<div class="screen" id="screen-reportar">
  <div class="form-card">
    <div class="form-title">Reportar un perro</div>
    <div class="form-sub">Tu reporte llega a todos los vecinos registrados en la app.</div>
    <div class="field">
      <label>Tipo de reporte</label>
      <select id="f-tipo">
        <option value="perdido">🚨 Mi perro se perdió</option>
        <option value="encontrado">🐾 Encontré un perro</option>
        <option value="avistamiento">👁️ Vi un perro perdido</option>
      </select>
    </div>
    <div class="row">
      <div class="field"><label>Nombre</label><input id="f-nombre" type="text" placeholder="Ej: Max"/></div>
      <div class="field"><label>Raza</label><input id="f-raza" type="text" placeholder="Ej: Golden"/></div>
    </div>
    <div class="row">
      <div class="field"><label>Color</label><input id="f-color" type="text" placeholder="Ej: Dorado"/></div>
      <div class="field">
        <label>Tamaño</label>
        <select id="f-tamano">
          <option>Pequeño</option><option>Mediano</option><option>Grande</option>
        </select>
      </div>
    </div>
    <div class="field"><label>Descripción</label><textarea id="f-desc" placeholder="Collar, señas particulares, comportamiento..."></textarea></div>
    <div class="field">
      <label>Última ubicación conocida</label>
      <input id="f-ubicacion" type="text" placeholder="Barrio o punto de referencia"/>
      <button class="location-btn" onclick="getLocation()">📍 Usar mi ubicación GPS</button>
    </div>
    <div class="field"><label>Recompensa (opcional)</label><input id="f-recompensa" type="text" placeholder="Ej: $200.000 COP"/></div>
    <div class="field"><label>Tu teléfono</label><input id="f-telefono" type="tel" placeholder="300 123 4567"/></div>
    <button class="btn-primary" id="btn-reportar" onclick="publicarReporte()">Publicar reporte 🐾</button>
  </div>
</div>

<!-- ENCONTRADOS -->
<div class="screen" id="screen-encontrados">
  <div class="section-title">Perros encontrados</div>
  <div class="cards" id="cards-encontrados"><div class="loading">Cargando...</div></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const SUPABASE_URL = 'https://cfqwfabqbgiddgsozxqa.supabase.co';
const SUPABASE_KEY = 'sb_publishable_cj1bpa69PyP0mqbvSocYsA_qM3AK6iL';

let mapInstance = null;
let userLat = 11.2408, userLng = -74.2121;

async function supabase(method, path, body) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : ''
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) throw new Error(await res.text());
  return method === 'POST' ? res.json() : res.json();
}

function showToast(msg, error) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (error ? ' error' : '');
  setTimeout(() => t.className = 'toast', 3000);
}

function showTab(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  const tabs = ['mapa','perdidos','reportar','encontrados'];
  document.querySelectorAll('.tab')[tabs.indexOf(name)].classList.add('active');
  if (name === 'mapa') { cargarMapa(); cargarCards('mapa'); }
  if (name === 'perdidos') cargarCards('perdidos');
  if (name === 'encontrados') cargarCards('encontrados');
}

function emojiPerro(raza) {
  if (!raza) return '🐕';
  const r = raza.toLowerCase();
  if (r.includes('poodle') || r.includes('caniche')) return '🐩';
  if (r.includes('pastor')) return '🦮';
  if (r.includes('bulldog')) return '🐶';
  return '🐕';
}

function compartirWA(r) {
  const tipo = r.tipo === 'perdido' ? '🚨 PERRO PERDIDO' : r.tipo === 'encontrado' ? '🐾 PERRO ENCONTRADO' : '👁️ AVISTAMIENTO';
  const msg = `${tipo}\n\n` +
    `Nombre: ${r.nombre || 'Sin nombre'}\n` +
    `Raza: ${r.raza || 'Desconocida'}\n` +
    `Color: ${r.color || ''}\n` +
    `Ubicación: ${r.ubicacion || 'Sin ubicación'}\n` +
    (r.recompensa ? `Recompensa: ${r.recompensa}\n` : '') +
    (r.telefono ? `Contacto: ${r.telefono}\n` : '') +
    `\nVer en el mapa: https://huellaviva.vercel.app\n\n` +
    `Comparte para ayudar a encontrarlo 🐾`;
  const url = 'https://wa.me/?text=' + encodeURIComponent(msg);
  window.open(url, '_blank');
}

function renderCard(r) {
  const tipo = r.tipo === 'perdido' ? 'tag-lost' : r.tipo === 'encontrado' ? 'tag-found' : 'tag-lost';
  const label = r.tipo === 'perdido' ? 'Perdido' : r.tipo === 'encontrado' ? 'Encontrado' : 'Avistamiento';
  return `<div class="dog-card ${r.tipo === 'perdido' ? 'urgent' : ''}">
    <div class="dog-avatar">${emojiPerro(r.raza)}</div>
    <div class="dog-info">
      <div class="dog-name">${r.nombre || 'Sin nombre'}</div>
      <div class="dog-meta">${r.raza || ''} ${r.color ? '· ' + r.color : ''}</div>
      <div class="dog-tags">
        <span class="tag ${tipo}">${label}</span>
        ${r.recompensa ? `<span class="tag tag-reward">${r.recompensa}</span>` : ''}
      </div>
      <div class="dog-distance">📍 ${r.ubicacion || 'Sin ubicación'} · ${r.telefono ? '📞 ' + r.telefono : ''}</div>
      <a class="wa-btn" onclick="compartirWA(${JSON.stringify(r).replace(/"/g, '&quot;')})">📲 Compartir en WhatsApp</a>
    </div>
  </div>`;
}

async function cargarCards(pantalla) {
  try {
    let filtro = '';
    let contenedor = '';
    if (pantalla === 'mapa') { filtro = 'activo=eq.true&order=created_at.desc&limit=5'; contenedor = 'cards-mapa'; }
    if (pantalla === 'perdidos') { filtro = 'tipo=eq.perdido&activo=eq.true&order=created_at.desc'; contenedor = 'cards-perdidos'; }
    if (pantalla === 'encontrados') { filtro = 'tipo=eq.encontrado&activo=eq.true&order=created_at.desc'; contenedor = 'cards-encontrados'; }

    const data = await supabase('GET', 'reportes?' + filtro);
    const el = document.getElementById(contenedor);

    if (!data || data.length === 0) {
      el.innerHTML = `<div class="empty"><div class="empty-icon">🐾</div>No hay reportes aún.<br>Sé el primero en reportar.</div>`;
      return;
    }

    el.innerHTML = data.map(renderCard).join('');
    document.getElementById('contador').textContent = data.length + ' activos';
  } catch(e) {
    showToast('Error cargando datos', true);
  }
}

async function cargarMapa() {
  if (mapInstance) { mapInstance.remove(); mapInstance = null; }
  mapInstance = L.map('map').setView([userLat, userLng], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(mapInstance);

  const blueIcon = L.divIcon({ className: '', html: '<div style="background:#4361ee;width:16px;height:16px;border-radius:50%;border:3px solid #fff"></div>', iconSize:[16,16], iconAnchor:[8,8] });
  L.marker([userLat, userLng], {icon: blueIcon}).addTo(mapInstance).bindPopup('Tu ubicación');

  try {
    const data = await supabase('GET', 'reportes?activo=eq.true&not.lat=is.null');
    data.forEach(r => {
      if (!r.lat || !r.lng) return;
      const color = r.tipo === 'perdido' ? '#ef233c' : '#06d6a0';
      const icon = L.divIcon({ className: '', html: `<div style="background:${color};width:14px;height:14px;border-radius:50%;border:2px solid #fff"></div>`, iconSize:[14,14], iconAnchor:[7,7] });
      L.marker([r.lat, r.lng], {icon}).addTo(mapInstance).bindPopup(`<b>${r.nombre || 'Sin nombre'}</b><br>${r.raza || ''}<br>${r.tipo}`);
    });
  } catch(e) {}
}

function getLocation() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;
      document.getElementById('f-ubicacion').value = userLat.toFixed(5) + ', ' + userLng.toFixed(5);
      showToast('Ubicación GPS obtenida!');
    }, () => showToast('No se pudo obtener GPS', true));
  }
}

async function publicarReporte() {
  const btn = document.getElementById('btn-reportar');
  const datos = {
    tipo: document.getElementById('f-tipo').value,
    nombre: document.getElementById('f-nombre').value,
    raza: document.getElementById('f-raza').value,
    color: document.getElementById('f-color').value,
    tamano: document.getElementById('f-tamano').value,
    descripcion: document.getElementById('f-desc').value,
    ubicacion: document.getElementById('f-ubicacion').value,
    recompensa: document.getElementById('f-recompensa').value,
    telefono: document.getElementById('f-telefono').value,
    lat: userLat,
    lng: userLng,
    activo: true
  };

  if (!datos.ubicacion) { showToast('Escribe la ubicación', true); return; }

  btn.disabled = true;
  btn.textContent = 'Publicando...';

  try {
    await supabase('POST', 'reportes', datos);
    showToast('Reporte publicado! Vecinos notificados.');
    ['f-nombre','f-raza','f-color','f-desc','f-ubicacion','f-recompensa','f-telefono'].forEach(id => document.getElementById(id).value = '');
    setTimeout(() => showTab('perdidos'), 1500);
  } catch(e) {
    showToast('Error al publicar. Intenta de nuevo.', true);
  }

  btn.disabled = false;
  btn.textContent = 'Publicar reporte 🐾';
}

cargarMapa();
cargarCards('mapa');
</script>
</body>
</html>
