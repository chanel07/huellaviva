<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HuellaViva — Admin</title>
  <meta name="theme-color" content="#0d0d1a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="HV Admin"/>
  <link rel="apple-touch-icon" href="https://res.cloudinary.com/dxjxiz7sp/image/upload/c_fill,w_180,h_180/v1778530227/oo8ilkashntvrqbktc6q.jpg"/>
  <link rel="manifest" href='data:application/manifest+json,{"name":"HuellaViva Admin","short_name":"HV Admin","start_url":".","display":"standalone","background_color":"#0d0d1a","theme_color":"#0d0d1a","icons":[{"src":"https://res.cloudinary.com/dxjxiz7sp/image/upload/c_fill,w_192,h_192/v1778530227/oo8ilkashntvrqbktc6q.jpg","sizes":"192x192","type":"image/jpeg"},{"src":"https://res.cloudinary.com/dxjxiz7sp/image/upload/c_fill,w_512,h_512/v1778530227/oo8ilkashntvrqbktc6q.jpg","sizes":"512x512","type":"image/jpeg"}]}'/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0d1a; --surface: #16162a; --surface2: #1e1e38;
      --accent: #ff6b35; --accent2: #ffd166; --green: #06d6a0;
      --red: #ef233c; --text: #f0f0f0; --muted: #8888aa;
      --border: rgba(255,255,255,0.08); --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

    /* LOGIN */
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; width: 100%; max-width: 360px; }
    .login-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 24px; color: var(--accent); margin-bottom: 4px; }
    .login-logo span { color: var(--accent2); }
    .login-sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
    .field { margin-bottom: 16px; }
    .field label { font-size: 11px; color: var(--muted); font-weight: 500; display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .field input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.2s; }
    .field input:focus { border-color: var(--accent); }
    .btn-primary { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 12px; padding: 14px; font-size: 14px; font-weight: 600; font-family: 'Syne', sans-serif; cursor: pointer; }
    .login-error { color: var(--red); font-size: 13px; margin-top: 10px; text-align: center; display: none; }

    /* ADMIN PANEL */
    .admin { display: none; }
    .admin-nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
    .admin-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; color: var(--accent); }
    .admin-logo span { color: var(--accent2); }
    .logout-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 6px 14px; font-size: 12px; cursor: pointer; }
    .admin-body { padding: 20px; max-width: 900px; margin: 0 auto; }

    /* STATS */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; text-align: center; }
    .stat-num { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: var(--accent); }
    .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* TABLE */
    .section-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 14px; }
    .filters { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .filter-btn { background: var(--surface); border: 1px solid var(--border); color: var(--muted); border-radius: 20px; padding: 6px 14px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
    .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .reporte-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; }
    .reporte-card.adopcion-card { border-left: 3px solid #F59E0B; }
    .reporte-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .reporte-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; }
    .reporte-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .reporte-desc { font-size: 13px; color: var(--text); margin-top: 8px; line-height: 1.5; }
    .reporte-contacto { font-size: 12px; color: var(--muted); margin-top: 6px; }
    .tag { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; white-space: nowrap; }
    .tag-lost { background: #ef233c22; color: #ef233c; }
    .tag-found { background: #06d6a022; color: #06d6a0; }
    .tag-avist { background: #ffd16622; color: #ffd166; }
    .tag-adopcion { background: #F59E0B22; color: #F59E0B; }
    .tag-inact { background: var(--surface2); color: var(--muted); }
    .reporte-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .action-btn { border: none; border-radius: 8px; padding: 7px 14px; font-size: 12px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    .action-btn:hover { opacity: 0.8; }
    .btn-encontrado { background: #06d6a022; color: var(--green); border: 1px solid #06d6a044; }
    .btn-adoptado { background: #F59E0B22; color: #F59E0B; border: 1px solid #F59E0B44; }
    .btn-borrar { background: #ef233c22; color: var(--red); border: 1px solid #ef233c44; }
    .btn-reactivar { background: #ffd16622; color: var(--accent2); border: 1px solid #ffd16644; }
    .empty { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }
    .loading { text-align: center; padding: 30px; color: var(--muted); }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--green); color: #000; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 600; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }
    .toast.error { background: var(--red); color: #fff; }
    .fecha { font-size: 11px; color: var(--muted); }
    .foto-thumb { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; margin-top: 8px; }

    /* === MATCHES IA === */
    .matches-section { display: none; }
    .matches-section.active { display: block; }
    .matches-header { background: linear-gradient(135deg, #7C3AED, #5B21B6); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 16px; color: #fff; }
    .matches-header-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; margin-bottom: 4px; }
    .matches-header-sub { font-size: 12px; opacity: 0.9; }
    .match-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 12px; }
    .match-stat { background: rgba(255,255,255,0.15); border-radius: 10px; padding: 8px; text-align: center; }
    .match-stat-num { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; }
    .match-stat-lbl { font-size: 10px; opacity: 0.85; text-transform: uppercase; letter-spacing: 0.5px; }
    .match-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; border-left: 3px solid #7C3AED; }
    .match-card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .match-card-id { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; color: #7C3AED; }
    .match-card-fecha { font-size: 11px; color: var(--muted); }
    .match-score-badge { background: linear-gradient(135deg, #7C3AED, #5B21B6); color: #fff; padding: 6px 14px; border-radius: 20px; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 14px; }
    .match-photos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .match-photo-box { position: relative; }
    .match-photo-tag { position: absolute; top: 6px; left: 6px; background: rgba(0,0,0,0.7); color: #fff; padding: 3px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; z-index: 2; }
    .match-photo-tag.lost { background: var(--red); }
    .match-photo-tag.found { background: var(--green); }
    .match-photo { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 10px; background: var(--surface2); }
    .match-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 12px; margin-bottom: 10px; }
    .match-info-box { background: var(--surface2); padding: 8px 10px; border-radius: 8px; }
    .match-info-titulo { font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; margin-bottom: 3px; }
    .match-info-content { color: var(--text); font-size: 12px; line-height: 1.4; }
    .match-razones { background: rgba(124,58,237,0.1); border-left: 2px solid #7C3AED; padding: 10px 12px; border-radius: 8px; font-size: 12px; color: var(--text); margin-bottom: 12px; line-height: 1.5; }
    .match-estado { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .estado-pendiente { background: #ffd16622; color: var(--accent2); }
    .estado-confirmado { background: #06d6a022; color: var(--green); }
    .estado-descartado { background: var(--surface2); color: var(--muted); }
    .match-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .btn-confirmar { background: #06d6a022; color: var(--green); border: 1px solid #06d6a044; }
    .btn-descartar { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <div class="login-logo">Huella<span>Viva</span></div>
    <div class="login-sub">Panel de administración</div>
    <div class="field">
      <label>Usuario</label>
      <input type="text" id="l-user" placeholder="admin"/>
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="l-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()"/>
    </div>
    <button class="btn-primary" onclick="login()">Entrar al panel</button>
    <div class="login-error" id="login-error">Usuario o contraseña incorrectos</div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="admin" id="admin-panel">
  <div class="admin-nav">
    <div class="admin-logo">Huella<span>Viva</span> <span style="font-size:12px;color:var(--muted);font-weight:400">Admin</span></div>
    <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
  </div>
  <div class="admin-body">
    <div class="stats" id="stats">
      <div class="stat-card"><div class="stat-num" id="s-total">-</div><div class="stat-label">Total reportes</div></div>
      <div class="stat-card"><div class="stat-num" id="s-perdidos" style="color:var(--red)">-</div><div class="stat-label">Perdidos</div></div>
      <div class="stat-card"><div class="stat-num" id="s-encontrados" style="color:var(--green)">-</div><div class="stat-label">Encontrados</div></div>
      <div class="stat-card"><div class="stat-num" id="s-adopcion" style="color:#F59E0B">-</div><div class="stat-label">Adopción</div></div>
      <div class="stat-card"><div class="stat-num" id="s-inactivos" style="color:var(--muted)">-</div><div class="stat-label">Resueltos</div></div>
      <div class="stat-card" style="cursor:pointer;border-color:#7C3AED44" onclick="filtrarMatches()"><div class="stat-num" id="s-matches" style="color:#7C3AED">-</div><div class="stat-label">🤖 Matches IA</div></div>
      <div class="stat-card" style="border-color:#EC489944"><div class="stat-num" id="s-mascotas" style="color:#EC4899">-</div><div class="stat-label">🐕 Mi Mascota</div></div>
    </div>

    <div class="section-title">Todos los reportes</div>
    <div class="filters">
      <button class="filter-btn active" onclick="filtrar('todos', this)">Todos</button>
      <button class="filter-btn" onclick="filtrar('perdido', this)">Perdidos</button>
      <button class="filter-btn" onclick="filtrar('encontrado', this)">Encontrados</button>
      <button class="filter-btn" onclick="filtrar('avistamiento', this)">Avistamientos</button>
      <button class="filter-btn" onclick="filtrar('adopcion', this)">Adopción</button>
      <button class="filter-btn" onclick="filtrar('inactivo', this)">Resueltos</button>
      <button class="filter-btn" onclick="filtrarMatches(this)" style="border-color:#7C3AED44;color:#7C3AED">🤖 Coincidencias IA</button>
    </div>

    <div id="reportes-lista"><div class="loading">Cargando reportes...</div></div>
    <div id="matches-lista" class="matches-section"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://cfqwfabqbgiddgsozxqa.supabase.co';
const SUPABASE_KEY = 'sb_publishable_cj1bpa69PyP0mqbvSocYsA_qM3AK6iL';
const ADMIN_USER = 'admin';
const ADMIN_PASS = 'huellaviva2024';

let todosReportes = [];
let filtroActual = 'todos';

function login() {
  const u = document.getElementById('l-user').value;
  const p = document.getElementById('l-pass').value;
  if (u === ADMIN_USER && p === ADMIN_PASS) {
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    cargarReportes();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}

function logout() {
  document.getElementById('login-wrap').style.display = 'flex';
  document.getElementById('admin-panel').style.display = 'none';
  document.getElementById('l-pass').value = '';
}

function showToast(msg, error) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (error ? ' error' : '');
  setTimeout(() => t.className = 'toast', 3000);
}

async function supabaseFetch(method, path, body) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : ''
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) throw new Error(await res.text());
  if (method === 'PATCH' || method === 'DELETE') return;
  return res.json();
}

async function cargarReportes() {
  try {
    const data = await supabaseFetch('GET', 'reportes?order=created_at.desc');
    todosReportes = data || [];
    actualizarStats();
    renderReportes();
    cargarMatches();
  } catch(e) {
    showToast('Error cargando datos', true);
  }
}

let todosMatches = [];
async function cargarMatches() {
  try {
    todosMatches = await supabaseFetch('GET', 'matches?order=created_at.desc') || [];
    document.getElementById('s-matches').textContent = todosMatches.length;
  } catch(e) {
    console.warn('Error cargando matches:', e);
    document.getElementById('s-matches').textContent = '0';
  }
}

function actualizarStats() {
  document.getElementById('s-total').textContent = todosReportes.length;
  document.getElementById('s-perdidos').textContent = todosReportes.filter(r => r.tipo === 'perdido' && r.activo).length;
  document.getElementById('s-encontrados').textContent = todosReportes.filter(r => r.tipo === 'encontrado' && r.activo).length;
  document.getElementById('s-adopcion').textContent = todosReportes.filter(r => r.tipo === 'adopcion' && r.activo).length;
  document.getElementById('s-inactivos').textContent = todosReportes.filter(r => !r.activo).length;
  cargarContadorMascotas();
}

async function cargarContadorMascotas() {
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/estadisticas?nombre=eq.mascotas_registradas&select=valor', {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    if (!res.ok) {
      document.getElementById('s-mascotas').textContent = '0';
      return;
    }
    const data = await res.json();
    document.getElementById('s-mascotas').textContent = (data && data[0]) ? data[0].valor : '0';
  } catch(e) {
    document.getElementById('s-mascotas').textContent = '-';
  }
}

function filtrar(tipo, btn) {
  filtroActual = tipo;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // Ocultar vista matches y mostrar reportes
  document.getElementById('matches-lista').classList.remove('active');
  document.getElementById('reportes-lista').style.display = 'block';
  renderReportes();
}

function filtrarMatches(btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  // Ocultar reportes y mostrar matches
  document.getElementById('reportes-lista').style.display = 'none';
  document.getElementById('matches-lista').classList.add('active');
  renderMatches();
}

function renderMatches() {
  const el = document.getElementById('matches-lista');
  if (!todosMatches.length) {
    el.innerHTML = `
      <div class="matches-header">
        <div class="matches-header-title">🤖 Coincidencias detectadas por IA</div>
        <div class="matches-header-sub">Aún no hay matches. Cuando alguien publique un perro encontrado y la IA detecte similitud con un perdido, aparecerá aquí.</div>
      </div>`;
    return;
  }
  // Mapear reportes por id para hidratar matches
  const reportesPorId = {};
  todosReportes.forEach(r => { reportesPorId[r.id] = r; });
  // Stats
  const pendientes = todosMatches.filter(m => m.estado === 'pendiente').length;
  const confirmados = todosMatches.filter(m => m.estado === 'confirmado').length;
  const descartados = todosMatches.filter(m => m.estado === 'descartado').length;
  const promedio = Math.round(todosMatches.reduce((s,m) => s + m.score, 0) / todosMatches.length);
  let html = `
    <div class="matches-header">
      <div class="matches-header-title">🤖 Coincidencias detectadas por IA</div>
      <div class="matches-header-sub">Gemini Vision compara automáticamente cada perro encontrado con los perdidos activos.</div>
      <div class="match-stats">
        <div class="match-stat"><div class="match-stat-num">${todosMatches.length}</div><div class="match-stat-lbl">Total</div></div>
        <div class="match-stat"><div class="match-stat-num">${pendientes}</div><div class="match-stat-lbl">Pendientes</div></div>
        <div class="match-stat"><div class="match-stat-num">${promedio}%</div><div class="match-stat-lbl">Score promedio</div></div>
      </div>
    </div>`;
  html += todosMatches.map(m => {
    const perdido = reportesPorId[m.reporte_perdido_id];
    const encontrado = reportesPorId[m.reporte_encontrado_id];
    const fecha = new Date(m.created_at).toLocaleDateString('es-CO', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
    const estadoClass = `estado-${m.estado}`;
    const estadoLabel = m.estado === 'confirmado' ? '✅ Confirmado' : m.estado === 'descartado' ? '❌ Descartado' : '⏳ Pendiente';
    return `<div class="match-card" id="match-${m.id}">
      <div class="match-card-head">
        <div>
          <div class="match-card-id">Match #${m.id}</div>
          <div class="match-card-fecha">🕐 ${fecha}</div>
        </div>
        <div class="match-score-badge">${m.score}%</div>
      </div>
      <div class="match-photos-grid">
        <div class="match-photo-box">
          <div class="match-photo-tag lost">PERDIDO</div>
          ${perdido && perdido.foto_url ? `<img class="match-photo" src="${perdido.foto_url}" />` : `<div class="match-photo" style="display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px;">Sin foto</div>`}
        </div>
        <div class="match-photo-box">
          <div class="match-photo-tag found">ENCONTRADO</div>
          ${encontrado && encontrado.foto_url ? `<img class="match-photo" src="${encontrado.foto_url}" />` : `<div class="match-photo" style="display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px;">Sin foto</div>`}
        </div>
      </div>
      <div class="match-info-grid">
        <div class="match-info-box">
          <div class="match-info-titulo">Perdido</div>
          <div class="match-info-content">${perdido ? [perdido.nombre, perdido.raza, perdido.color].filter(Boolean).join(' · ') || 'Sin datos' : 'Reporte no disponible'}<br><span style="color:var(--muted);font-size:11px;">${perdido ? (perdido.ubicacion || '') : ''}</span></div>
        </div>
        <div class="match-info-box">
          <div class="match-info-titulo">Encontrado</div>
          <div class="match-info-content">${encontrado ? [encontrado.raza, encontrado.color].filter(Boolean).join(' · ') || 'Sin datos' : 'Reporte no disponible'}<br><span style="color:var(--muted);font-size:11px;">${encontrado ? (encontrado.ubicacion || '') : ''}</span></div>
        </div>
      </div>
      ${m.razones ? `<div class="match-razones">💡 <b>IA dice:</b> ${m.razones}</div>` : ''}
      <span class="match-estado ${estadoClass}">${estadoLabel}</span>
      ${m.estado === 'pendiente' ? `<div class="match-actions">
        <button class="action-btn btn-confirmar" onclick="confirmarMatchAdmin(${m.id})">✅ Confirmar match</button>
        <button class="action-btn btn-descartar" onclick="descartarMatchAdmin(${m.id})">❌ Descartar</button>
      </div>` : `<div class="match-actions">
        <button class="action-btn btn-borrar" onclick="borrarMatch(${m.id})">🗑️ Borrar match</button>
      </div>`}
    </div>`;
  }).join('');
  el.innerHTML = html;
}

async function confirmarMatchAdmin(id) {
  try {
    await supabaseFetch('PATCH', `matches?id=eq.${id}`, { estado: 'confirmado' });
    const m = todosMatches.find(x => x.id === id);
    if (m) m.estado = 'confirmado';
    renderMatches();
    showToast('✅ Match confirmado!');
  } catch(e) { showToast('Error', true); }
}

async function descartarMatchAdmin(id) {
  try {
    await supabaseFetch('PATCH', `matches?id=eq.${id}`, { estado: 'descartado' });
    const m = todosMatches.find(x => x.id === id);
    if (m) m.estado = 'descartado';
    renderMatches();
    showToast('Match descartado');
  } catch(e) { showToast('Error', true); }
}

async function borrarMatch(id) {
  if (!confirm('¿Borrar este match permanentemente?')) return;
  try {
    await supabaseFetch('DELETE', `matches?id=eq.${id}`);
    todosMatches = todosMatches.filter(x => x.id !== id);
    document.getElementById('s-matches').textContent = todosMatches.length;
    renderMatches();
    showToast('Match borrado');
  } catch(e) { showToast('Error', true); }
}

function renderReportes() {
  let lista = todosReportes;
  if (filtroActual === 'inactivo') lista = todosReportes.filter(r => !r.activo);
  else if (filtroActual !== 'todos') lista = todosReportes.filter(r => r.tipo === filtroActual && r.activo);

  const el = document.getElementById('reportes-lista');
  if (lista.length === 0) {
    el.innerHTML = '<div class="empty">No hay reportes en esta categoría</div>';
    return;
  }

  el.innerHTML = lista.map(r => {
    const esAdopcion = r.tipo === 'adopcion';
    const tagClass = !r.activo ? 'tag-inact' : r.tipo === 'perdido' ? 'tag-lost' : r.tipo === 'encontrado' ? 'tag-found' : r.tipo === 'adopcion' ? 'tag-adopcion' : 'tag-avist';
    const tagLabel = !r.activo ? 'Resuelto' : r.tipo === 'perdido' ? '🚨 Perdido' : r.tipo === 'encontrado' ? '✅ Encontrado' : r.tipo === 'adopcion' ? '🏠 Adopción' : '👁️ Avistamiento';
    const fecha = new Date(r.created_at).toLocaleDateString('es-CO', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });

    const btnAccion = r.activo
      ? esAdopcion
        ? `<button class="action-btn btn-adoptado" onclick="marcarAdoptado('${r.id}')">🏠 Marcar como adoptado</button>`
        : `<button class="action-btn btn-encontrado" onclick="marcarEncontrado('${r.id}')">✅ Marcar como encontrado</button>`
      : `<button class="action-btn btn-reactivar" onclick="reactivar('${r.id}')">🔄 Reactivar</button>`;

    return `<div class="reporte-card ${esAdopcion ? 'adopcion-card' : ''}" id="card-${r.id}">
      <div class="reporte-header">
        <div>
          <div class="reporte-name">${r.nombre || 'Sin nombre'}</div>
          <div class="reporte-meta">${r.raza || 'Raza desconocida'} · ${r.color || ''} · ${r.tamano || ''}</div>
        </div>
        <span class="tag ${tagClass}">${tagLabel}</span>
      </div>
      ${r.foto_url ? `<img src="${r.foto_url}" class="foto-thumb" />` : ''}
      ${r.descripcion ? `<div class="reporte-desc">${r.descripcion}</div>` : ''}
      <div class="reporte-contacto">
        📍 ${r.ubicacion || 'Sin ubicación'} &nbsp;|&nbsp; 
        📞 ${r.telefono || 'Sin teléfono'}
        ${r.recompensa ? ` &nbsp;|&nbsp; 💰 ${r.recompensa}` : ''}
      </div>
      <div class="fecha" style="margin-top:6px">🕐 ${fecha}</div>
      <div class="reporte-actions">
        ${btnAccion}
        <button class="action-btn btn-borrar" onclick="borrarReporte('${r.id}')">🗑️ Borrar</button>
      </div>
    </div>`;
  }).join('');
}

async function marcarEncontrado(id) {
  try {
    await supabaseFetch('PATCH', `reportes?id=eq.${id}`, { activo: true, tipo: 'encontrado' });
    const r = todosReportes.find(x => x.id === id);
    if (r) { r.tipo = 'encontrado'; }
    actualizarStats();
    renderReportes();
    showToast('✅ Marcado como encontrado!');
  } catch(e) { showToast('Error', true); }
}

async function marcarAdoptado(id) {
  try {
    await supabaseFetch('PATCH', `reportes?id=eq.${id}`, { activo: false });
    const r = todosReportes.find(x => x.id === id);
    if (r) { r.activo = false; }
    actualizarStats();
    renderReportes();
    showToast('🏠 Marcado como adoptado!');
  } catch(e) { showToast('Error', true); }
}

async function reactivar(id) {
  try {
    await supabaseFetch('PATCH', `reportes?id=eq.${id}`, { activo: true });
    const r = todosReportes.find(x => x.id === id);
    if (r) r.activo = true;
    actualizarStats();
    renderReportes();
    showToast('Reporte reactivado!');
  } catch(e) { showToast('Error', true); }
}

async function borrarReporte(id) {
  if (!confirm('¿Seguro que quieres borrar este reporte?')) return;
  try {
    await supabaseFetch('DELETE', `reportes?id=eq.${id}`);
    todosReportes = todosReportes.filter(x => x.id !== id);
    actualizarStats();
    renderReportes();
    showToast('Reporte borrado');
  } catch(e) { showToast('Error', true); }
}

// Service Worker mínimo para que el admin sea instalable como app
if ('serviceWorker' in navigator) {
  const swCode = 'self.addEventListener("install",e=>self.skipWaiting());self.addEventListener("activate",e=>self.clients.claim());self.addEventListener("fetch",e=>{});';
  const swBlob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}
</script>
